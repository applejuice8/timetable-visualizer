<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container text-center">
        <h1>Timetable <span id="index" class="badge text-bg-dark">1</span></h1>

        <div class="table-responsive">
            <table id="table" class="table table-secondary table-bordered border-secondary align-middle"></table>
        </div>

        <div class="d-flex justify-content-center gap-4">
            <button id="prev" class="btn btn-dark btn-lg">Prev</button>
            <button id="next" class="btn btn-dark btn-lg">Next</button>
        </div>
    </div>

    <script src="timetable.js"></script>
</body>

</html>
